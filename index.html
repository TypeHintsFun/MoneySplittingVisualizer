<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распределение бюджета</title>
    <!-- Шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Основные стили -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<button class="theme-toggle" id="theme-toggle" title="Переключить тему">🌙</button>
<button class="copy-link-btn" id="copy-link-btn" title="Скопировать ссылку">
    <span>🔗</span>
    <span id="copy-link-text">Скопировать ссылку</span>
</button>

<div class="app-container">
    <div class="left-panel">
        <select id="chart-type-select" class="chart-type-select">
            <option value="doughnut">🍩 Круговая диаграмма</option>
            <option value="bar">📊 Один разделенный столбец</option>
        </select>

        <div class="total-box">
            <label>Общая сумма (₽)</label>
            <input type="number" id="total-input" value="100000" min="0">
        </div>
        
        <div class="remaining-box" id="remaining-box">Остаток: 0 ₽</div>

        <div class="chart-container">
            <div class="chart-wrapper">
                <canvas id="myChart"></canvas>
                <div class="chart-center" id="chart-center">
                    <div class="chart-center-val" id="chart-center-val">100 000 ₽</div>
                    <div class="chart-center-label">Всего</div>
                </div>
            </div>
            <div id="custom-legend" class="custom-legend"></div>
        </div>
    </div>

    <div class="right-panel">
        <div class="panel-title">Распределение по частям</div>
        <div class="categories-list" id="categories-list"></div>
        <button class="add-btn" id="add-btn">
            <span>+</span> Добавить категорию
        </button>
    </div>
</div>

<!-- Скрипты приложения -->
<script src="static/js/state.js"></script>
<script src="static/js/chart-engine.js"></script>
<script src="static/js/ui-renderer.js"></script>
<script src="static/js/theme-manager.js"></script>
<script src="static/js/main.js"></script>

</body>
</html>
